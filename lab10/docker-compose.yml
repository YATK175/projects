services:
  app:
    build:
      context: .
      target: runner
    ports:
      - '3000:3000'
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      ADMIN_API_KEY: docker-admin-key
      PRODUCTION_CORS_ORIGIN: https://example.com
      EXTERNAL_API_URL: http://external:3001
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      MYSQL_DB: books_lab10
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: this-is-a-docker-jwt-secret-32-chars
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: books_lab10
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-ppassword']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  external:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install -g json-server && json-server db.json --host 0.0.0.0 --port 3001"
    ports:
      - '3001:3001'

volumes:
  mysql_data:
  redis_data:
